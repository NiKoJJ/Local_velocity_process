# ============================================================
#  autoRIFT_S1_Local_Pipeline — 用户配置文件
# ============================================================

# ── 输入数据 ─────────────────────────────────────────────────
input:
  reference_zip: "/data1/PhD_Work1/AutoRIFT3/results/20220906_20220918/S1A_IW_SLC__1SSH_20220906T100810_20220906T100839_044882_055C64_6595.zip"
  secondary_zip: "/data1/PhD_Work1/AutoRIFT3/results/20220906_20220918/S1A_IW_SLC__1SSH_20220918T100810_20220918T100839_045057_056240_6AC7.zip"
  dem_file:      "/data1/PhD_Work1/aws3_tif/dem_120m_clip.tif"
  ssm_file:      "/data1/PhD_Work1/aws3_tif/SPS_0120m_StableSurface.tif"
  # ssm_file: null

# ── Burst 选择 ───────────────────────────────────────────────
burst_selection:
  swath:       1
  burst_index: 0
  burst_id: null

# ── 轨道文件 ─────────────────────────────────────────────────
orbit:
  orbit_dir:       "/data2/Phd_Work1/Cook/Orbits"
  allow_download:  true

# ── 处理参数 ─────────────────────────────────────────────────
processing:
  base_results_dir: "results" 
  working_dir:   "work/"
  output_dir:    "output/"

  epsg: null   # null = 自动从 DEM 读取

  # ── Chip size 参数 ─────────────────────────────────────────────
  # 优先级：chip_size_min/max_m（非 null）> SPS chip size tif
  #
  # 设置为数值（如 240）→ 全场使用均匀值，完全跳过 SPS chip size tif 文件。
  #   推荐：均匀值（240m:960m=1:4）经 Geogrid 转换后满足 autoRIFT 的
  #         ChipSize0 整数倍约束，不会出现 "chip sizes must be even integers" 错误。
  # 设置为 null → 若 sps_params 中提供了 chip_size_*_file 则使用 SPS 文件，
  #   但 SPS 像素值可能不满足倍数约束，有报错风险。
  chip_size_min_m:   240     # 均匀最小 chip 尺寸（米）；null = 使用 SPS tif
  chip_size_max_m:   960     # 均匀最大 chip 尺寸（米）；null = 使用 SPS tif

  # ── 搜索范围（SPS tif 优先；此值为回退/无 SPS 时的默认值）───────
  search_range_m_yr: 3000   # 最大预期速度（m/yr）；SPS search_range_*_file 优先

  # ── autoRIFT 参数 ───────────────────────────────────────────
  filter_type:      "WAL"
  filter_width:      21
  oversample_ratio:  64
  n_threads:         40

  # ── 速度后处理 ──────────────────────────────────────────────
  # 超出此阈值的像素视为物理异常值，置为 NoData（-32767）
  # 南极最快冰川（Smith / Thwaites）约 10000 m/yr，20000 为保守上限
  velocity_max_m_yr: 20000

  # ── 输出控制 ────────────────────────────────────────────────
  save_offsets:   true    # 同时保存原始像素偏移量 offset.tif
  output_netcdf:  true    # 同时输出 CF-1.8 NetCDF 产品（含误差估计）
  pair_name:      null    # null = 自动由日期生成

# ── SPS 空间参数文件（可选）─────────────────────────────────────
# 覆盖整个南极的空间变化参数栅格（EPSG:3031, 120m）。
# 若提供，将自动重采样到 DEM 格网，替代 processing 中的均匀回退值。
# 若全部为 null，自动回退到 processing 中的均匀值（与 v3 旧行为一致）。
#
# 提供 vx0_file + vy0_file 时：
#   - 作为 Geogrid 先验速度（改善搜索偏移量精度）
#   - autorift_runner 利用参考速度场计算 Vx_Error / Vy_Error
# 不提供时：
#   - Geogrid 先验速度设为零
#   - 误差 = 稳定地表像素上速度的标准差（视稳定地表真实速度为 0）
sps_params:
  dhdx_file:             /data1/PhD_Work1/aws3_tif/SPS_0120m_dhdx.tif
  dhdy_file:             /data1/PhD_Work1/aws3_tif/SPS_0120m_dhdy.tif
  vx0_file:              /data1/PhD_Work1/aws3_tif/SPS_0120m_vx0.tif   # SPS_0120m_vx0.tif
  vy0_file:              /data1/PhD_Work1/aws3_tif/SPS_0120m_vy0.tif   # SPS_0120m_vy0.tif
  search_range_x_file:   /data1/PhD_Work1/aws3_tif/SPS_0120m_vxSearchRange.tif   # SPS_0120m_vxSearchRange.tif
  search_range_y_file:   /data1/PhD_Work1/aws3_tif/SPS_0120m_vySearchRange.tif   # SPS_0120m_vySearchRange.tif
  chip_size_min_x_file:  /data1/PhD_Work1/aws3_tif/SPS_0120m_xMinChipSize.tif   # SPS_0120m_xMinChipSize.tif
  chip_size_min_y_file:  /data1/PhD_Work1/aws3_tif/SPS_0120m_yMinChipSize.tif   # SPS_0120m_yMinChipSize.tif
  chip_size_max_x_file:  /data1/PhD_Work1/aws3_tif/SPS_0120m_xMaxChipSize.tif   # SPS_0120m_xMaxChipSize.tif
  chip_size_max_y_file:  /data1/PhD_Work1/aws3_tif/SPS_0120m_yMaxChipSize.tif   # SPS_0120m_yMaxChipSize.tif
